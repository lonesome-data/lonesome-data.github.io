<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sean Forester | Strategic AI Transformation Leader</title>
    <meta name="description"
        content="Strategic AI Transformation Leader & Enterprise AI Strategist. 12+ years of high-stakes AI/ML leadership and technical innovation.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Sean Forester | Strategic AI Transformation Leader">
    <meta property="og:description"
        content="Strategic AI Transformation Leader & Enterprise AI Strategist.">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sean Forester | Strategic AI Transformation Leader">
    <meta name="google-site-verification" content="mP6LODLZKOv-g3-o4u9GFvXRx89HUDxku34jBAKWYyE" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;700&display=swap"
        rel="stylesheet">
    <meta http-equiv="refresh" content="4;url=https://lonesome-data.github.io/professional-portfolio/">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glow-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.35;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: #6366f1;
            top: -10%;
            left: -5%;
            animation: drift 12s ease-in-out infinite alternate;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: #22d3ee;
            bottom: -10%;
            right: -5%;
            animation: drift 10s ease-in-out infinite alternate-reverse;
        }

        @keyframes drift {
            from { transform: translate(0, 0); }
            to { transform: translate(40px, 30px); }
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            padding: 3rem 3.5rem;
            max-width: 520px;
            text-align: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #e2e8f0, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.85rem;
            font-weight: 300;
            color: #9ca3af;
            margin-bottom: 2rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .redirect-msg {
            font-size: 0.95rem;
            color: #cbd5e1;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        a.enter {
            display: inline-block;
            padding: 0.7rem 2rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
            background: rgba(99, 102, 241, 0.25);
            border: 1px solid rgba(99, 102, 241, 0.5);
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
        }

        a.enter:hover {
            background: rgba(99, 102, 241, 0.45);
            border-color: #6366f1;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .auto-redirect {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="glow-container">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="card">
        <h1>Sean Forester</h1>
        <div class="subtitle">Strategic AI Transformation Leader</div>
        <p class="redirect-msg">
            Redirecting to portfolio.
        </p>
        <a class="enter" href="https://lonesome-data.github.io/professional-portfolio/">
            Enter Portfolio
        </a>
        <p class="auto-redirect">
            <span class="spinner"></span> Auto-redirecting in a few seconds
        </p>
    </div>
</body>

</html>
